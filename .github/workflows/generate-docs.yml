name: Generate Documentation on PR

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: generate-docs-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  detect-changes:
    if: github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    outputs:
      pipeline_changed: ${{ steps.changed-files.outputs.any_changed }}
    steps:
      - uses: actions/checkout@v6
      - name: Check for pipeline file changes
        id: changed-files
        uses: tj-actions/changed-files@v47.0.5
        with:
          files: |
            .github/workflows/**
            docs.json.update.sh
            docs-tabs.json
            .mintignore

  generate-docs:
    needs: detect-changes
    if: needs.detect-changes.outputs.pipeline_changed == 'true'
    uses: ./.github/workflows/pull-from-bazel-build.yml
    secrets: inherit
    with:
      is_internal_pr: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
